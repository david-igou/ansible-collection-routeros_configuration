---
# Build the antsibull-docs / Sphinx docsite (collection + role reference,
# generated from each role's meta/argument_specs.yml, the role READMEs, and
# the collection README) and publish it to GitHub Pages, using the
# ansible-community/github-docs-build reusable workflows (the approach the
# antsibull-docs docs recommend; mirrors felixfontein/ansible-acme).
#
# Published under versioned paths on the `gh-pages` branch:
#   branch/main, branch/stable-*, tag/<tag> ; landing at .../branch/main/.
# Pages source stays "GitHub Actions" — the publish job pushes gh-pages then
# deploys it via the OIDC actions/deploy-pages flow.
#
# One-time prerequisites (manual):
#   1. Settings -> Actions -> General -> allow all actions and reusable workflows.
#   2. Settings -> Pages -> Source = "GitHub Actions".
#   3. An orphan `gh-pages` branch must exist (the publish job checks it out).
#
# The github-docs-build reusable workflows have no releases to pin against, so
# they are pinned to a commit SHA with a `# main` comment for Renovate.

name: "Docs"

concurrency:
  group: docs-push-${{ github.sha }}
  cancel-in-progress: true

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - main
    tags:
      - '*'
  # Daily rebuild catches breakage from newer antsibull-docs / theme releases
  # (the reusable workflow installs the latest at build time).
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build-docs:
    permissions:
      contents: read
    name: Build Ansible Docs
    uses: ansible-community/github-docs-build/.github/workflows/_shared-docs-build-push.yml@f724ea35f2f4f14a18c45ad363ffa5f76eabeec9 # main
    with:
      collection-name: david_igou.routeros_configuration
      init-lenient: false
      init-fail-on-error: true
      squash-hierarchy: true
      init-project: RouterOS Configuration Collection
      init-copyright: david_igou.routeros_configuration contributors
      init-title: RouterOS Configuration Collection Documentation
      init-html-short-title: RouterOS Configuration Docs
      init-extra-html-theme-options: |
        documentation_home_url=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/branch/main/

  publish-docs-gh-pages:
    # Skip on forks (no Pages / write token to publish to).
    if: github.repository == 'david-igou/ansible-collection-routeros_configuration'
    permissions:
      contents: write
      pages: write
      id-token: write
    needs: [build-docs]
    name: Publish Ansible Docs
    uses: ansible-community/github-docs-build/.github/workflows/_shared-docs-build-publish-gh-pages.yml@f724ea35f2f4f14a18c45ad363ffa5f76eabeec9 # main
    with:
      artifact-name: ${{ needs.build-docs.outputs.artifact-name }}
      publish-gh-pages-branch: true
    secrets:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
