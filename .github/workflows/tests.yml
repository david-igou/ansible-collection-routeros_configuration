---
name: "CI"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# Nothing here writes to the repo; reusable workflows inherit this cap.
permissions:
  contents: read

on: # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - main
  workflow_dispatch:
  # Monthly full-suite run against a real CHR. PR runs prove a change didn't
  # break the collection; this run catches the world changing around it —
  # community.routeros / ansible.netcommon resolve to their LATEST releases at
  # run time (requirements.yml floats >=), so upstream breakage surfaces here
  # instead of mid-PR.
  schedule:
    - cron: '0 6 1 * *'

jobs:
  changelog:
    uses: ansible/ansible-content-actions/.github/workflows/changelog.yaml@2f18fdf5765dfdcd31781acb9c9b3206bc3f34ea # main
    if: github.event_name == 'pull_request'
  build-import:
    uses: ansible/ansible-content-actions/.github/workflows/build_import.yaml@2f18fdf5765dfdcd31781acb9c9b3206bc3f34ea # main
  ansible-lint:
    uses: ansible/ansible-content-actions/.github/workflows/ansible_lint.yaml@2f18fdf5765dfdcd31781acb9c9b3206bc3f34ea # main
  sanity:
    uses: ansible/ansible-content-actions/.github/workflows/sanity.yaml@2f18fdf5765dfdcd31781acb9c9b3206bc3f34ea # main
  unit-galaxy:
    uses: ansible/ansible-content-actions/.github/workflows/unit.yaml@2f18fdf5765dfdcd31781acb9c9b3206bc3f34ea # main
  unit-source:
    uses: ansible-network/github_actions/.github/workflows/unit_source.yml@b92245bb38f21aef0dd1abdc1ed431e9951e71fb # main
    with:
      collection_pre_install: >-
        git+https://github.com/ansible-collections/ansible.utils.git
  scenario-guard:
    # A molecule scenario not listed in the Makefile's SHARED_SCENARIOS /
    # SELF_OWNING would silently never run (CI never uses --all).
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Assert every molecule scenario is wired into the Makefile
        run: make check-scenarios

  molecule-qemu:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        # Three jobs instead of one-per-scenario, each delegating to the
        # Makefile so the scenario list, ordering invariants, and dependency
        # resolution live in ONE place (SHARED_SCENARIOS / the `install`
        # prerequisite — see the Makefile). `shared` boots ONE CHR (the
        # `default` scenario owns create/prepare/destroy via molecule's
        # shared_state) and runs every shared scenario against it in a single
        # sequential pass; `chr` (network_cli feasibility) and `lifecycle`
        # (destructive end-to-end: restore round-trip, /import, real reset
        # wipe) opt out of shared_state and each boot their own VM.
        include:
          - name: shared
            cmd: make molecule-shared
          - name: chr
            cmd: make molecule SCENARIO=chr
          - name: lifecycle
            cmd: make molecule SCENARIO=lifecycle
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install host qemu tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            qemu-system-x86 \
            qemu-utils \
            cloud-image-utils \
            genisoimage \
            ovmf \
            sshpass \
            unzip

      - name: Expose Ubuntu OVMF firmware at the path molecule_provisioners expects
        # Ubuntu ships OVMF at /usr/share/OVMF/; molecule_provisioners defaults
        # to /usr/share/edk2/ovmf/ (Fedora/RHEL path). The chr scenario is BIOS,
        # so this only matters if a scenario sets firmware: uefi — wired up
        # defensively so adding a UEFI scenario doesn't silently break.
        run: |
          sudo mkdir -p /usr/share/edk2/ovmf
          for f in OVMF_CODE OVMF_VARS; do
            if [ -f "/usr/share/OVMF/${f}_4M.fd" ]; then
              sudo ln -sf "/usr/share/OVMF/${f}_4M.fd" "/usr/share/edk2/ovmf/${f}.fd"
            elif [ -f "/usr/share/OVMF/${f}.fd" ]; then
              sudo ln -sf "/usr/share/OVMF/${f}.fd" "/usr/share/edk2/ovmf/${f}.fd"
            fi
          done

      - name: Install Python test dependencies
        # Python tooling only (molecule, ansible-pylibssh, librouteros — see
        # test-requirements.txt). Every ansible-galaxy install (runtime deps,
        # the pinned test provisioner, and the collection under test) happens
        # in the Makefile's `install` prerequisite, so CI and a local
        # `make molecule` resolve dependencies identically.
        run: |
          python -m pip install --upgrade pip
          pip install ansible-core -r test-requirements.txt

      - name: Run molecule (${{ matrix.name }})
        run: ${{ matrix.cmd }}

  all_green:
    if: ${{ always() }}
    needs:
      - changelog
      - build-import
      - sanity
      - unit-galaxy
      - unit-source
      - ansible-lint
      - scenario-guard
      - molecule-qemu
    runs-on: ubuntu-latest
    steps:
      # Fail if ANY required job failed or was cancelled. 'skipped' is allowed
      # (changelog is skipped on workflow_dispatch and the monthly schedule).
      # Every job in `needs` above must appear here, or its failure would not
      # gate the merge.
      - run: >-
          python -c "results = {
          '${{ needs.changelog.result }}',
          '${{ needs.build-import.result }}',
          '${{ needs.sanity.result }}',
          '${{ needs.unit-galaxy.result }}',
          '${{ needs.ansible-lint.result }}',
          '${{ needs.unit-source.result }}',
          '${{ needs.scenario-guard.result }}',
          '${{ needs.molecule-qemu.result }}'};
          assert not ({'failure', 'cancelled'} & results), results"
