[defaults]
roles_path          = roles
collections_path    = ~/.ansible/collections
host_key_checking   = false
callbacks_enabled   = profile_tasks

[ssh_connection]
pipelining          = True
ssh_args            = -o ControlMaster=auto -o ControlPersist=60s

# The persistent-connection daemon backs community.routeros over network_cli
# (used by the molecule `chr` scenario and any RouterOS management here).
# The 30 s defaults are too tight for RouterOS — commands routinely take
# several seconds and the idle-timer fires on gaps between calls. Bumping to
# 120 s removes both the connect- and command-timeout classes. This replaces
# the per-command ANSIBLE_PERSISTENT_*_TIMEOUT env vars used during bring-up.
[persistent_connection]
connect_timeout     = 120
command_timeout     = 120
