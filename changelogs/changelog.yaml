ancestor: null
releases:
  0.0.1-alpha:
    changes:
      breaking_changes:
      - The 41 per-path roles are replaced by a single ``configure`` role driven by
        a ``routeros_config`` dict keyed by RouterOS slash path (e.g. ``/ip/pool``).
        Adding a new path no longer requires a new role; ``configure`` applies all
        paths in a canonical dependency order. The internal ``_reconcile`` engine
        is unchanged.
      bugfixes:
      - Fixed the broken C(CHANGELOG.rst) link in C(README.md) (it pointed at a non-existent
        C(ansible-collections/david_igou.routeros_configuration) repo).
      - Role C(meta/main.yml) and role README footers declared C(GPL-2.0-or-later)
        while the collection is licensed C(GPL-3.0-or-later) (the shipped C(LICENSE)
        is GPLv3); the declarations were corrected to match, and a C(LICENSES/GPL-3.0-or-later.txt)
        was added so the filter plugin's SPDX header resolves.
      - 'The two firewall examples in C(README.md) and C(roles/configure/README.md)
        purged a keyless path (C(/ip/firewall/filter)) with the default C(content:
        ignore), a combination C(community.routeros.api_modify) rejects at runtime;
        the examples now set C(content: remove_as_much_as_possible) so they run as
        written.'
      doc_changes:
      - 'Corrected the connection-method description in C(README.md) and the guide:
        only C(configure)/C(_reconcile) use C(api_modify) and C(export_vars) uses
        C(api_info); the operational roles use the generic C(community.routeros.api)
        module, and C(backup) runs over C(network_cli) (SSH) because RouterOS C(/export)
        is console-only.'
      - Every role's reference documentation now includes three worked examples (configure,
        export_vars, backup, restore, certificate, upgrade, user_password, command,
        fetch, ping, reboot, reset), added via each role's C(meta/argument_specs.yml)
        so they render in the role reference, and derived from the collection's molecule
        scenarios so the shown invocations match what CI exercises against a CHR.
      - Expanded the C(README.md) Roles table to list all shipped roles (it previously
        listed only C(configure) and C(_reconcile)), populated the C(requires_ansible)
        section, and filled in the Roadmap and More-information sections.
      - Removed a stale C(integration_hello_world) row from the molecule scenario
        catalogue, fixed the C(ping) role's example playbook (the C(assert) was a
        malformed second play), and tightened several role-doc wordings (C(/import
        file-name=), certificate value quoting, C(user_password) C(no_log) scope).
      - The declarative-config examples in the getting-started guide and the C(configure)
        argument spec were converted from flow-style ("JSON in YAML") firewall mappings
        to block style, completing the block-style convention.
      - The getting-started guide's inventory example now sets C(routeros_api_hostname)
        so it connects to C(ansible_host) rather than the literal C(inventory_hostname).
      minor_changes:
      - "New C(backup) role: backs up RouterOS configuration following the official
        backup/restore mechanisms. It writes an idempotent text export (C(/export
        show-sensitive)) to a C(.rsc) file on the controller \u2014 rewritten only
        when the device config changed \u2014 and can optionally take a full-fidelity
        binary backup (C(/system backup save)) on the device. Runs over network_cli
        (C(/export) is console-only, not on the binary API). The README documents
        the C(/import) and C(/system backup load) restore procedures and that the
        text export omits user passwords, certificates, SSH keys, Dude, and the User-manager
        database."
      - 'New C(certificate) role: creates and signs RouterOS certificates over the
        API (C(community.routeros.api), since api_modify treats C(certificate) as
        read-only), idempotently by name. Supports self-signed CAs and CA-signed host
        certificates via C(routeros_certificates). Closes the TLS-bootstrap gap.'
      - "New C(command) role \u2014 run arbitrary RouterOS API operations (C(cmd)/C(add)/C(remove)/C(update));
        an escape hatch for one-off actions."
      - 'New C(export_vars) role: the reverse of C(configure). Reads a running device
        over the API (C(community.routeros.api_info)) and writes an equivalent C(routeros_config)
        vars file to the controller (one per host), so an existing device can be brought
        under declarative management (capture, version-control, re-apply). Captures
        every configurable path by default (omitting empty ones), overridable via
        C(routeros_export_vars_paths); includes secrets by default (encrypt with vault)
        with a C(routeros_export_vars_redact) toggle.'
      - "New C(fetch) role \u2014 transfer files to/from the device via C(/tool fetch)
        and remove files via C(/file remove) (stages firmware/scripts/certs, pulls
        backups)."
      - "New C(ping) role \u2014 connectivity checks via C(/tool ping) over the API."
      - "New C(poe) role \u2014 imperative PoE-out operations over the binary API:
        C(power_cycle) a port, force C(power_off)/C(power_on) (C(poe-out=off|auto-on|forced-on|...)),
        or read-only C(monitor) of live PoE-out status (returned in the C(routeros_poe_monitor)
        fact). The operational counterpart to C(configure), which retains the persistent
        PoE knobs (ping watchdog, C(power-cycle-interval), priority, voltage, LLDP,
        and the global power budget). Write actions fail on an empty interface list,
        and a named interface with no PoE-out entry fails clearly. Live PoE operations
        are hardware-dependent and untested on the CHR used in CI (no PoE controller);
        molecule covers the input-validation and no-entry paths."
      - "New C(reboot) role \u2014 reboot (and wait for the API) or shut down the
        device."
      - "New C(reset) role \u2014 C(/system reset-configuration), gated behind an
        explicit confirm var (destructive)."
      - "New C(restore) role \u2014 restore from a binary backup (C(/system backup
        load), reboots) or import a config script (C(/import)). The reverse of C(backup)."
      - 'New C(upgrade) role: manages the RouterOS package update channel idempotently
        and checks for updates over the API, with an opt-in, gated install+reboot
        (C(routeros_upgrade_install)) that only fires when an update is available.'
      - "New C(user_password) role \u2014 set/rotate C(/user) account passwords (the
        write-only field C(configure) cannot manage)."
      - 'New filter C(david_igou.routeros_configuration.to_routeros_config): shapes
        looped C(api_info) results into a C(routeros_config) dict (drops C(.id), omits
        empty paths, optional redaction). Used by the C(export_vars) role.'
      - The C(certificate) role can now export certificates to files (C(routeros_certificates_export)),
        import them (C(routeros_certificates_import)), and request ACME/Let's Encrypt
        certs (C(routeros_acme), gated).
      - The C(certificate) role's mutating tasks now report C(changed) correctly,
        and import skips certificates that already exist so re-runs do not create
        duplicate entries; the ACME task is now C(no_log).
      - The C(command) role now validates that each item specifies exactly one of
        C(cmd)/C(add)/C(remove)/C(update), failing on a typo'd or ambiguous key instead
        of silently no-op'ing or running twice.
      - The C(fetch) role's C(mode) option is now constrained to C(http)/C(https)/C(ftp)/C(tftp)/C(sftp)
        via argument-spec C(choices), so an invalid mode fails validation instead
        of at runtime.
      - The C(reset) and C(upgrade) install paths now wait for the API to actually
        answer (not just for the TCP port to open) after the reboot, matching C(reboot)
        and C(restore).
      - The C(upgrade) role can now upgrade RouterBOARD firmware (C(routeros_routerboard_upgrade),
        gated).
      - The C(upgrade) role's RouterBOARD firmware path now only flashes and reboots
        when the installed firmware differs from the available firmware, instead of
        rebooting on every run when the feature is enabled.
      - The C(user_password) role now fails loudly when a named user does not exist
        instead of silently skipping it and reporting success.
      - The ``_reconcile`` role no longer ships an empty ``routeros_api_password``
        default. The password is now intentionally undefined so a missing value fails
        loudly instead of silently attempting an empty-password login; supply it via
        vault/group_vars.
      - The ``configure`` role README and ``_reconcile`` README gained an "Idempotency
        & rollback" section, and ``configure``'s argument spec now documents the nested
        ``routeros_config`` keys (``data``/``purge``/``order``/ ``content``).
      - "The ``configure`` role's ``rcfg_path_order`` now covers every configurable
        path in ``community.routeros`` ``api_modify`` (508 paths), arranged in a dependency-correct
        order \u2014 referenced objects before referencers and parents before children
        (e.g. IPsec proposal/profile before peer/policy, pools before DHCP servers,
        bridge before ports/VLANs, OSPF/BGP instances before their areas/peers, wireless/wifi/CAPsMAN
        profile chains, containers, IPv6 addressing). Previously only ~50 interface/IP
        paths were ordered, so dependency-sensitive paths outside that set relied
        on the user's declaration order."
      - "The operational roles now quote user-supplied values (C(community.routeros.quote_argument_value))
        before interpolating them into RouterOS API command strings \u2014 C(user_password)
        passwords, C(restore) backup name/password, C(certificate) names/CA/passphrases,
        C(fetch) url/dst-path, C(ping) address/interface, and C(reset) run-after-reset
        \u2014 so values containing spaces or special characters no longer break the
        command."
      - The post-reboot C(wait_for) in C(reboot), C(restore), C(reset), and C(upgrade)
        now derives the API port from C(routeros_api_tls) (8729 when TLS, 8728 otherwise)
        instead of hardcoding 8728, so the wait works with the default TLS connection.
      - YAML examples in the documentation, and the collection's own YAML, use block
        style throughout instead of flow-style ("JSON in YAML") mappings and sequences.
      - '``_reconcile`` ``meta/argument_specs.yml`` now mirrors the role defaults
        for the shared ``routeros_api_*`` connection vars and documents the password
        as a secret.'
      release_summary: "Initial alpha release of ``david_igou.routeros_configuration``
        \u2014 an Ansible\ncollection for managing MikroTik RouterOS declaratively.
        At its core, the\n``configure`` role reconciles a single ``routeros_config``
        data structure\nagainst the device (driving any ``community.routeros`` ``api_modify``
        path in a\ncanonical dependency order), with ``export_vars`` for the reverse
        capture.\nAround it sit single-purpose operational roles \u2014 ``backup``,
        ``restore``,\n``certificate``, ``upgrade``, ``user_password``, ``command``,
        ``fetch``,\n``ping``, ``poe``, ``reboot``, and ``reset`` \u2014 most over
        the binary API, with\n``backup`` over ``network_cli``. This is an early ``0.0.x``
        release; expect\nbreaking changes before ``1.0.0``.\n"
    fragments:
    - backup-molecule-fix.yml
    - backup-role.yml
    - certificate-role.yml
    - ci-fix-lint-and-devel-matrix.yml
    - ci-gate-hardening.yml
    - configure-role.yml
    - cop-review-fixes.yml
    - docs-license-flow-style-review.yml
    - docsite-role-examples.yml
    - export-vars-role.yml
    - op-roles-cert-upgrade-ext.yml
    - op-roles-fetch-userpw.yml
    - op-roles-ping-command.yml
    - op-roles-restore-reboot-reset.yml
    - op-roles-review-fixes.yml
    - path-order-complete.yml
    - poe-role.yml
    - release-summary.yml
    - upgrade-role.yml
    release_date: '2026-06-06'
  0.0.2-alpha:
    changes:
      bugfixes:
      - export_vars role - a full export (``routeros_export_vars_paths`` left unset,
        so every canonical path is read) no longer aborts when the device does not
        implement a path. ``api_info`` failures matching "not supported" or "no such
        command" are tolerated and that path is omitted from the captured config;
        all other failures (auth, connection, TLS) still abort the play. Previously
        a single unimplemented path (wireless, CAPsMAN, container, LoRa, etc.) failed
        the whole run and no vars file was written. Skipped paths are reported via
        a debug task.
      release_summary: 'Patch release. Hardens the ``export_vars`` role so a full
        export (every

        canonical path) completes on real devices, which never implement the entire

        path set. Paths the device does not support are now skipped instead of

        aborting the run.'
    fragments:
    - export_vars-tolerate-unsupported-paths.yml
    - release_summary.yml
    release_date: '2026-06-08'
  0.0.3-alpha:
    changes:
      bugfixes:
      - export_vars role - a full export (``routeros_export_vars_paths`` left unset,
        so every canonical path is read) no longer aborts on the RouterOS "contact
        MikroTik support and send a supout file" sentinel, returned for paths whose
        schema accepts the read but whose device-side read implementation is broken
        (historically seen under ``/routing/pimsm/*`` and occasional ``/interface/*``
        edges on RouterOS 7.x). ``api_info`` failures whose message contains "contact
        MikroTik support" are now tolerated alongside the existing "not supported"
        / "no such command" patterns; the path is omitted from the captured config.
        Any other failure (auth, connection, TLS) still aborts.
      release_summary: "Patch release. Extends the ``export_vars`` tolerance set so
        a full export also\nsurvives the RouterOS \"contact MikroTik support and send
        a supout file\"\nsentinel \u2014 emitted by paths whose schema accepts the
        read but whose device-\nside read implementation is broken (e.g. ``/routing/pimsm/*``
        on 7.x).\n"
    fragments:
    - export_vars-tolerate-supout-errors.yml
    - release_summary.yml
    release_date: '2026-06-08'
  0.0.4-alpha:
    changes:
      bugfixes:
      - export_vars role - entries left with no settable fields once ``.id`` is removed
        (all-default singletons, ``.id``-only entries) are now dropped, and paths
        left with no entries are omitted, instead of emitting empty ``data`` blocks
        holding a single empty mapping.
      minor_changes:
      - export_vars role - order-sensitive paths (firewall chains, routing filters,
        simple queues) are now captured with ``order`` and ``purge`` both true so
        the configure role enforces the exact ordered state. The set is the new ``routeros_export_vars_ordered_paths``
        variable.
      - export_vars role - paths that ``api_modify`` understands but which capture
        runtime state, hardware enumeration, or auto-generated defaults rather than
        intent (``/file``, ``/system/script/environment``, ``/ip/pool/used``, ``/system/resource/*``,
        ``/partitions``, ``/queue/interface``, ``/ip/cloud``, ``/certificate``) are
        now excluded by default via the new ``routeros_export_vars_exclude_paths``
        variable (set to ``[]`` to capture all). A companion ``routeros_export_vars_exclude_paths_extra``
        is merged onto that list, so additional paths can be dropped without re-listing
        the defaults.
      - export_vars role - the export is now restricted to paths the configure role
        can modify. The role intersects the requested paths (or the full canonical
        order) with the configure role's ``rcfg_path_order``; a requested path that
        the configure role cannot modify is dropped before querying the device and
        reported in a debug message, so a captured file always re-applies cleanly.
      - export_vars role - unset device fields are now omitted from the capture by
        default (new ``routeros_export_vars_handle_disabled`` variable, default ``omit``).
        The previous ``api_info`` default emitted every unset field as a ``!field``
        marker, which dominated a full export. Set it to ``exclamation`` to keep the
        ``!field`` markers (the configure role reads them as reset-to-default) or
        ``null-value`` for ``field=null``.
      - export_vars role - volatile runtime fields are stripped from the capture via
        the new ``routeros_export_vars_volatile_fields`` variable (by default ``/system/clock``'s
        ``date`` and ``time``, which would otherwise re-apply a stale timestamp).
      release_summary: 'Patch release. Overhauls the ``export_vars`` role so a capture
        is a clean,

        faithful, re-appliable declarative baseline rather than a mostly-noise dump:

        unset fields are omitted, empty entries dropped, only configure-modifiable

        paths are captured, order-sensitive paths (firewall chains, routing filters,

        simple queues) are captured with order and purge, runtime/state paths are

        excluded, and volatile fields are stripped.'
    fragments:
    - export_vars-clean-modifiable-output.yml
    - release_summary.yml
    release_date: '2026-06-08'
  0.0.5-alpha:
    changes:
      bugfixes:
      - export_vars role - order-sensitive paths are now captured with ``content``
        (new ``routeros_export_vars_ordered_content`` variable, default ``remove_as_much_as_possible``)
        alongside ``order`` and ``purge``. Without it the configure role passed ``handle_absent_entries=remove``
        with the default ``handle_entries_content=ignore``, which ``api_modify`` rejects
        on firewall/routing-filter/queue paths, so every captured ordered path aborted
        on re-apply. The export_vars molecule scenario now feeds the captured config
        back through the configure role in check mode to cover this round-trip.
      release_summary: "Patch release. Fixes the ``export_vars`` capture of order-sensitive
        paths\n(firewall chains, routing filters, simple queues) so they re-apply
        cleanly\nthrough the ``configure`` role \u2014 they now carry ``content``
        alongside ``order``\nand ``purge``, instead of aborting on a remove/ignore
        combination ``api_modify``\nrejects."
    fragments:
    - export_vars-emit-content-on-ordered-paths.yml
    - release_summary.yml
    release_date: '2026-06-08'
  0.0.6-alpha:
    changes:
      bugfixes:
      - "configure role - ``rcfg_path_order`` (in ``roles/configure/vars/main.yml``)
        listed 42 RouterOS paths that ``community.routeros.api_modify`` cannot write
        \u2014 read-only / ``api_info``-only containers and status paths such as ``/interface``,
        ``/ip/ipsec/key``, ``/caps-man/actual-interface-configuration``, and the ``/dude/ros/*``,
        ``/iot/*``, ``/lora/*`` and ``/routing/isis/*`` status trees. Because ``export_vars``
        filters its captures through ``rcfg_path_order``, any full export that captured
        one of these aborted on apply with ``value of path must be one of: ...``.
        All 42 non-writable paths are removed so every captured baseline re-applies
        cleanly through ``configure``."
      release_summary: 'Patch release. Fixes the ``configure`` role''s ``rcfg_path_order``
        so full ``export_vars`` captures re-apply cleanly: 42 read-only / ``api_info``-only
        paths that ``community.routeros.api_modify`` cannot write (starting with the
        ``/interface`` container that aborted every full baseline) are removed from
        the canonical apply order, and a unit test now guards the list against re-introducing
        non-writable paths.'
    fragments:
    - rcfg-path-order-drop-nonwritable-paths.yml
    - release_summary.yml
    release_date: '2026-06-09'
