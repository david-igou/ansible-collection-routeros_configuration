---
trivial:
  - >-
    CI molecule jobs now delegate to the Makefile (``make molecule-shared`` /
    ``make molecule SCENARIO=...``), making the Makefile the single source of
    truth for the scenario list, ordering invariants, and dependency
    resolution. This brings the previously CI-omitted ``configure_check_mode``,
    ``poe``, ``negative``, and ``lifecycle`` scenarios into CI, and adds a
    monthly scheduled full-suite run so upstream regressions (new
    community.routeros / ansible.netcommon releases) surface between PRs.
