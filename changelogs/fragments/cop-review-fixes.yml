---
minor_changes:
  - >-
    The ``_reconcile`` role no longer ships an empty ``routeros_api_password``
    default. The password is now intentionally undefined so a missing value
    fails loudly instead of silently attempting an empty-password login; supply
    it via vault/group_vars.
  - >-
    ``_reconcile`` ``meta/argument_specs.yml`` now mirrors the role defaults for
    the shared ``routeros_api_*`` connection vars and documents the password as a
    secret.
  - >-
    The ``configure`` role README and ``_reconcile`` README gained an
    "Idempotency & rollback" section, and ``configure``'s argument spec now
    documents the nested ``routeros_config`` keys (``data``/``purge``/``order``/
    ``content``).
  - >-
    YAML examples in the documentation, and the collection's own YAML, use block
    style throughout instead of flow-style ("JSON in YAML") mappings and
    sequences.
