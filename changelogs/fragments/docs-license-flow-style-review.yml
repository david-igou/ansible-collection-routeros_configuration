---
bugfixes:
  - >-
    The two firewall examples in C(README.md) and C(roles/configure/README.md)
    purged a keyless path (C(/ip/firewall/filter)) with the default
    C(content: ignore), a combination C(community.routeros.api_modify) rejects
    at runtime; the examples now set C(content: remove_as_much_as_possible) so
    they run as written.
  - >-
    Role C(meta/main.yml) and role README footers declared C(GPL-2.0-or-later)
    while the collection is licensed C(GPL-3.0-or-later) (the shipped C(LICENSE)
    is GPLv3); the declarations were corrected to match, and a
    C(LICENSES/GPL-3.0-or-later.txt) was added so the filter plugin's SPDX
    header resolves.
  - >-
    Fixed the broken C(CHANGELOG.rst) link in C(README.md) (it pointed at a
    non-existent C(ansible-collections/david_igou.routeros_configuration) repo).
doc_changes:
  - >-
    The declarative-config examples in the getting-started guide and the
    C(configure) argument spec were converted from flow-style ("JSON in YAML")
    firewall mappings to block style, completing the block-style convention.
  - >-
    Corrected the connection-method description in C(README.md) and the guide:
    only C(configure)/C(_reconcile) use C(api_modify) and C(export_vars) uses
    C(api_info); the operational roles use the generic C(community.routeros.api)
    module, and C(backup) runs over C(network_cli) (SSH) because RouterOS
    C(/export) is console-only.
  - >-
    Expanded the C(README.md) Roles table to list all shipped roles (it
    previously listed only C(configure) and C(_reconcile)), populated the
    C(requires_ansible) section, and filled in the Roadmap and More-information
    sections.
  - >-
    The getting-started guide's inventory example now sets
    C(routeros_api_hostname) so it connects to C(ansible_host) rather than the
    literal C(inventory_hostname).
  - >-
    Removed a stale C(integration_hello_world) row from the molecule scenario
    catalogue, fixed the C(ping) role's example playbook (the C(assert) was a
    malformed second play), and tightened several role-doc wordings
    (C(/import file-name=), certificate value quoting, C(user_password) C(no_log)
    scope).
