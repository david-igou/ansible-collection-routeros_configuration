---
bugfixes:
  - >-
    export_vars role - captured vars files failed ansible-lint's
    ``yaml[indentation]`` rule on every list-bearing path (passing only at the
    ``min`` profile), so captures could not be committed to a linted inventory
    repository without lint exceptions. ``to_nice_yaml`` (PyYAML underneath)
    emits flush/indentless block sequences — the list dash aligned with its
    parent key — while ansible-lint's yamllint config expects indented
    sequences. Captures are now serialized with the new
    ``david_igou.routeros_configuration.to_indented_yaml`` filter, which
    matches ``to_nice_yaml`` layout except that block sequences are indented,
    and the file gains the conventional ``---`` document start the role README
    already showed. Captured files now pass ansible-lint's default
    (``production``) profile and plain yamllint out of the box.
minor_changes:
  - >-
    new ``to_indented_yaml`` filter - serialize a data structure to YAML with
    block sequences indented beneath their parent key (ansible-lint /
    yamllint clean), unlike ``to_nice_yaml``'s flush style. Useful for writing
    any generated vars file destined for a linted repository.
