---
minor_changes:
  - >-
    New C(restore) role — restore from a binary backup (C(/system backup load),
    reboots) or import a config script (C(/import)). The reverse of C(backup).
  - >-
    New C(reboot) role — reboot (and wait for the API) or shut down the device.
  - >-
    New C(reset) role — C(/system reset-configuration), gated behind an explicit
    confirm var (destructive).
