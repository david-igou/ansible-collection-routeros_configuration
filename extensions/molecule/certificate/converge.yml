---
- name: Converge — create and sign certificates via the certificate role
  hosts: molecule
  gather_facts: false
  vars:
    routeros_certificates:
      # Self-signed CA (no `ca:`).
      - name: mol-ca
        common_name: Molecule Test CA
        key_usage: [key-cert-sign, crl-sign]
      # Host certificate signed by that CA.
      - name: mol-host
        common_name: host.molecule.test
        ca: mol-ca
    # Export mol-ca to a kept file (verified present) and mol-host to a file that
    # the import then consumes (RouterOS deletes a file after importing it).
    routeros_certificates_export:
      - name: mol-ca
        file_name: mol-ca-keep
        type: pem
      - name: mol-host
        file_name: mol-host-imp
        type: pem
    routeros_certificates_import:
      - file_name: mol-host-imp.crt
        name: mol-host-imported
  roles:
    - role: david_igou.routeros_configuration.certificate
