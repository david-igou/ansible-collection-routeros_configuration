---
- name: Verify — both certificates exist, are signed, and form a trust chain
  hosts: molecule
  gather_facts: false
  module_defaults:
    # One block covers every community.routeros api* module via the
    # collection's `api` action group.
    group/community.routeros.api:
      hostname: "{{ routeros_api_hostname }}"
      username: "{{ routeros_api_username }}"
      password: "{{ routeros_api_password }}"
      tls: "{{ routeros_api_tls }}"
      validate_certs: "{{ routeros_api_validate_certs }}"
      port: "{{ routeros_api_port | default(omit, true) }}"
  tasks:
    - name: Read certificates
      community.routeros.api:
        path: certificate
      delegate_to: localhost
      connection: local
      register: certs

    - name: Read files
      community.routeros.api:
        path: file
      delegate_to: localhost
      connection: local
      register: certfiles

    - name: Resolve the mol-ca and mol-host entries
      ansible.builtin.set_fact:
        _ca: "{{ certs.msg | selectattr('name', 'equalto', 'mol-ca') | first }}"
        _host: "{{ certs.msg | selectattr('name', 'equalto', 'mol-host') | first }}"

    - name: Assert certs are signed, chained to the CA, and the export/import files are correct
      ansible.builtin.assert:
        that:
          # Both certificates exist and are signed (non-empty fingerprint).
          - certs.msg | selectattr('name', 'equalto', 'mol-ca') | list | length == 1
          - certs.msg | selectattr('name', 'equalto', 'mol-host') | list | length == 1
          - _ca['fingerprint'] | default('') | length > 0
          - _host['fingerprint'] | default('') | length > 0
          # Trust chain: RouterOS records the signing CA name on the host cert,
          # and the host's Authority Key Id must equal the CA's Subject Key Id —
          # cryptographic proof mol-host was signed by mol-ca.
          - _host['ca'] | default('') == 'mol-ca'
          - _host['akid'] | default('') | length > 0
          - _host['akid'] == _ca['skid']
          # Export kept mol-ca-keep.crt; import consumed mol-host-imp.crt.
          # (Re-importing a cert the device already holds is a RouterOS no-op —
          # it dedups by fingerprint and creates no new entry — so the import's
          # observable effect here is that it consumes its source file.)
          - certfiles.msg | selectattr('name', 'equalto', 'mol-ca-keep.crt') | list | length == 1
          - certfiles.msg | selectattr('name', 'equalto', 'mol-host-imp.crt') | list | length == 0
        success_msg: >-
          mol-ca + mol-host signed; mol-host chained to mol-ca
          (ca=mol-ca, akid==ca.skid); export kept mol-ca-keep.crt; import consumed mol-host-imp.crt
        fail_msg: >-
          host.ca={{ _host['ca'] | default('?') }} host.akid={{ _host['akid'] | default('?') }}
          ca.skid={{ _ca['skid'] | default('?') }}
          files={{ certfiles.msg | map(attribute='name') | list }}

    # IDEMPOTENCE OF THE ROLE'S OWN SKIP GATES (create+sign only — the
    # export→import file dance is imperative, which is why the scenario-level
    # idempotence step stays dropped). The gates are hand-written role code:
    # `add` is skipped when the name already exists, `sign` when the
    # fingerprint is set. Re-running create+sign must therefore leave the
    # certificate table identical — a broken sign gate re-signs and changes the
    # fingerprint; a broken add gate errors or duplicate-suffixes the name.
    # (export/import/acme default to [] so only create+sign runs here.)
    - name: Re-run the role with create+sign only (skip gates must no-op)
      ansible.builtin.include_role:
        name: david_igou.routeros_configuration.certificate
      vars:
        routeros_certificates:
          - name: mol-ca
            common_name: Molecule Test CA
            key_usage:
              - key-cert-sign
              - crl-sign
          - name: mol-host
            common_name: host.molecule.test
            ca: mol-ca

    - name: Re-read certificates after the create+sign re-run
      community.routeros.api:
        path: certificate
      delegate_to: localhost
      connection: local
      register: certs_rerun

    - name: Assert the re-run was a no-op (same entries, same fingerprints)
      ansible.builtin.assert:
        that:
          - certs_rerun.msg | map(attribute='name') | sort == certs.msg | map(attribute='name') | sort
          - (certs_rerun.msg | selectattr('name', 'equalto', 'mol-ca') | first)['fingerprint'] == _ca['fingerprint']
          - (certs_rerun.msg | selectattr('name', 'equalto', 'mol-host') | first)['fingerprint'] == _host['fingerprint']
        success_msg: >-
          create+sign re-run was a no-op: the role's skip gates held
          (certificate names and fingerprints unchanged)
        fail_msg: >-
          re-run mutated certificate state:
          before={{ certs.msg | map(attribute='name') | list }}
          after={{ certs_rerun.msg | map(attribute='name') | list }}
