---
- name: Verify — both certificates exist and are signed
  hosts: molecule
  gather_facts: false
  module_defaults:
    community.routeros.api:
      hostname: "{{ routeros_api_hostname }}"
      username: "{{ routeros_api_username }}"
      password: "{{ routeros_api_password }}"
      tls: "{{ routeros_api_tls }}"
      validate_certs: "{{ routeros_api_validate_certs }}"
      port: "{{ routeros_api_port | default(omit, true) }}"
  tasks:
    - name: Read certificates
      community.routeros.api:
        path: certificate
      delegate_to: localhost
      connection: local
      register: certs

    - name: Read files
      community.routeros.api:
        path: file
      delegate_to: localhost
      connection: local
      register: certfiles

    - name: Assert certs are signed and the exported cert file exists
      ansible.builtin.assert:
        that:
          - certs.msg | selectattr('name', 'equalto', 'mol-ca') | list | length == 1
          - certs.msg | selectattr('name', 'equalto', 'mol-host') | list | length == 1
          - (certs.msg | selectattr('name', 'equalto', 'mol-ca') | first)['fingerprint'] | default('') | length > 0
          - (certs.msg | selectattr('name', 'equalto', 'mol-host') | first)['fingerprint'] | default('') | length > 0
          - certfiles.msg | selectattr('name', 'equalto', 'mol-ca-keep.crt') | list | length == 1
          - certfiles.msg | selectattr('name', 'equalto', 'mol-host-imp.crt') | list | length == 0
        success_msg: "certs signed; export created mol-ca-keep.crt; import consumed mol-host-imp.crt"
        fail_msg: "export/import wrong: {{ certfiles.msg | map(attribute='name') | list }}"
