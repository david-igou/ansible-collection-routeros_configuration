---
all:
  children:
    molecule:
      hosts:
        chr-1:
          mp:
            qemu:
              # CHR ships a zipped raw .img. The qemu role's image cache
              # downloads this URL, unzips it (largest entry), and qemu-img
              # converts the raw disk to qcow2 — all by content sniffing, no
              # pre-staging. Requires the role's zip/raw support (>= 0.0.2-alpha).
              # VERSION PIN duplicated in utils/inventory/hosts.yml — bump both.
              image: "https://download.mikrotik.com/routeros/7.21.4/chr-7.21.4.img.zip"
              ssh_user: admin
              cpus: 1
              memory: 512
              # Give the CHR 8 ether interfaces (ether1..ether8) to simulate a
              # multi-port device for interface/bridge/VLAN config testing.
              # ether1 is net0 (the role's SLIRP SSH NIC); these add ether2..ether8.
              # SLIRP (type=user) NICs just make the ports appear in RouterOS — no
              # host L2 reachability needed. Explicit MACs keep enumeration stable.
              # Requires mp.qemu.extra_args support (>= 0.0.4-alpha).
              extra_args:
                - -netdev
                - "user,id=net1"
                - -device
                - "virtio-net-pci,netdev=net1,mac=52:54:00:00:01:02"
                - -netdev
                - "user,id=net2"
                - -device
                - "virtio-net-pci,netdev=net2,mac=52:54:00:00:01:03"
                - -netdev
                - "user,id=net3"
                - -device
                - "virtio-net-pci,netdev=net3,mac=52:54:00:00:01:04"
                - -netdev
                - "user,id=net4"
                - -device
                - "virtio-net-pci,netdev=net4,mac=52:54:00:00:01:05"
                - -netdev
                - "user,id=net5"
                - -device
                - "virtio-net-pci,netdev=net5,mac=52:54:00:00:01:06"
                - -netdev
                - "user,id=net6"
                - -device
                - "virtio-net-pci,netdev=net6,mac=52:54:00:00:01:07"
                - -netdev
                - "user,id=net7"
                - -device
                - "virtio-net-pci,netdev=net7,mac=52:54:00:00:01:08"
