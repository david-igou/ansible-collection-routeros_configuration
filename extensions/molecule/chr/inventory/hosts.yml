---
all:
  children:
    molecule:
      hosts:
        chr-1:
          mp:
            qemu:
              # Real qcow2 produced by files/stage-chr-image.sh (CHR ships zipped
              # raw; the role consumes qcow2). file:// lets the role's image cache
              # ingest it without download/decompress.
              image: "file://{{ lookup('env', 'HOME') }}/.cache/chr-images/chr-7.21.4.qcow2"
              ssh_user: admin
              cpus: 1
              memory: 512
