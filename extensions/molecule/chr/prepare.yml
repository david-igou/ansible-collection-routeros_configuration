---
# The image is staged in create.yml (before provisioning). CHR has no POSIX
# shell, so we deliberately do NOT import the provisioner's prepare (which runs
# wait_for_connection / a Python module). The SSH TCP-wait and admin-password
# bootstrap are shared with the shared-CHR prepare
# (utils/playbooks/tasks/bootstrap_admin.yml) so the boot-race retry logic
# cannot drift between the two again.
- name: Wait for CHR SSH and bootstrap an admin password
  hosts: molecule
  gather_facts: false
  # Play var (not the `connection:` keyword) so it overrides the runtime
  # inventory's host-level ansible_connection: ssh. wait_for then runs locally.
  vars:
    ansible_connection: local
  tasks:
    - name: Wait for SSH and bootstrap the admin password (shared tasks)
      ansible.builtin.include_tasks: ../utils/playbooks/tasks/bootstrap_admin.yml
