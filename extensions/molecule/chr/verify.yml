---
- name: Verify Molecule can reach the RouterOS CLI on CHR
  hosts: molecule
  gather_facts: false
  # Connection set at play level so it overrides the qemu role's runtime
  # inventory (ssh + key auth). ansible_host / ansible_port still come from
  # the runtime inventory. The +cet1024w login suffix makes RouterOS skip its
  # interactive terminal cursor-probe so network_cli doesn't hang.
  vars:
    ansible_connection: ansible.netcommon.network_cli
    ansible_network_os: community.routeros.routeros
    ansible_network_cli_ssh_type: libssh
    ansible_user: "admin+cet1024w"
    ansible_password: "{{ chr_admin_password }}"
    ansible_ssh_common_args: >-
      -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
  tasks:
    - name: Query system resource over the RouterOS CLI
      community.routeros.command:
        commands:
          - /system resource print
      register: chr_resource
      retries: 6
      delay: 10
      until: chr_resource is succeeded

    - name: Assert the response identifies RouterOS
      ansible.builtin.assert:
        that:
          - chr_resource.stdout | length > 0
          - chr_resource.stdout[0] is search('version')
        success_msg: >-
          RouterOS reachable via qemu provider:
          {{ chr_resource.stdout[0] | regex_search('version:[^\\n]*') | trim }}
        fail_msg: "Did not get a RouterOS resource response: {{ chr_resource.stdout | default('<none>') }}"
