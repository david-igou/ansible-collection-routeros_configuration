---
- name: Converge — keyed list paths via configure
  hosts: molecule
  gather_facts: false
  vars:
    routeros_config:
      /ip/pool:
        data:
          - name: pool-a
            ranges: "192.168.60.10-192.168.60.50"
          - name: pool-b
            ranges: "192.168.61.10-192.168.61.50"
      /ip/dns/static:
        data:
          - name: router.lan
            address: "192.168.88.1"
  roles:
    - role: david_igou.routeros_configuration.configure
