---
- name: Converge — singleton paths via configure
  hosts: molecule
  gather_facts: false
  vars:
    routeros_config:
      /system/identity:
        data:
          - name: configure-chr
      /ip/dns:
        data:
          - servers: "1.1.1.1,8.8.8.8"
            allow-remote-requests: false
      /ip/settings:
        data:
          - tcp-syncookies: true
  roles:
    - role: david_igou.routeros_configuration.configure
