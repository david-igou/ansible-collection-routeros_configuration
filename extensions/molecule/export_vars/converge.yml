---
- name: Converge — capture device config into a routeros_config vars file
  hosts: molecule
  gather_facts: false
  vars:
    routeros_export_vars_dir: "{{ lookup('ansible.builtin.env', 'MOLECULE_EPHEMERAL_DIRECTORY') }}/captured"
    # Small path set for a fast, focused test (the default is all 508 paths).
    routeros_export_vars_paths:
      - /ip/address
      - /system/identity
      # Always-present path that historically carried many unset-field markers —
      # exercises handle_disabled=omit (the default): the capture must contain no
      # "!"-prefixed keys.
      - /ip/service
      # Order-sensitive: must be captured with order: true AND purge: true.
      - /ip/firewall/filter
      # Volatile date/time must be stripped, leaving time-zone-name.
      - /system/clock
      # In rcfg_path_order but excluded as runtime state (default
      # routeros_export_vars_exclude_paths): must never be queried or emitted.
      - /file
      # Unimplemented on a CHR (no wireless package) but IS configure-modifiable
      # (in rcfg_path_order): api_info errors with "no such command", which
      # export_vars must tolerate — skip the path rather than abort.
      - /interface/wireless
      # NOT modifiable by the configure role (absent from rcfg_path_order):
      # export_vars must drop it before querying the device and never emit it.
      - /routing/bfd/interface
  tasks:
    # Ensure a recognizable entry exists (idempotent, via the API) so the capture
    # has a known value to assert on.
    - name: Ensure a known /ip/address entry exists
      community.routeros.api_modify:
        hostname: "{{ routeros_api_hostname }}"
        username: "{{ routeros_api_username }}"
        password: "{{ routeros_api_password }}"
        tls: "{{ routeros_api_tls }}"
        validate_certs: "{{ routeros_api_validate_certs }}"
        port: "{{ routeros_api_port }}"
        path: ip address
        data:
          - address: 192.168.99.1/24
            interface: ether4
        handle_absent_entries: ignore
      delegate_to: localhost
      connection: local

    - name: Ensure a known /system/identity exists
      community.routeros.api_modify:
        hostname: "{{ routeros_api_hostname }}"
        username: "{{ routeros_api_username }}"
        password: "{{ routeros_api_password }}"
        tls: "{{ routeros_api_tls }}"
        validate_certs: "{{ routeros_api_validate_certs }}"
        port: "{{ routeros_api_port }}"
        path: system identity
        data:
          - name: export-vars-id
      delegate_to: localhost
      connection: local

    - name: Ensure a known timezone (so /system/clock keeps config after volatile strip)
      community.routeros.api_modify:
        hostname: "{{ routeros_api_hostname }}"
        username: "{{ routeros_api_username }}"
        password: "{{ routeros_api_password }}"
        tls: "{{ routeros_api_tls }}"
        validate_certs: "{{ routeros_api_validate_certs }}"
        port: "{{ routeros_api_port }}"
        path: system clock
        data:
          - time-zone-name: America/New_York
      delegate_to: localhost
      connection: local

    - name: Ensure a known firewall filter rule (order-sensitive path is non-empty)
      community.routeros.api_modify:
        hostname: "{{ routeros_api_hostname }}"
        username: "{{ routeros_api_username }}"
        password: "{{ routeros_api_password }}"
        tls: "{{ routeros_api_tls }}"
        validate_certs: "{{ routeros_api_validate_certs }}"
        port: "{{ routeros_api_port }}"
        path: ip firewall filter
        data:
          - chain: input
            action: accept
            protocol: icmp
            comment: export-vars-test
        handle_absent_entries: ignore
      delegate_to: localhost
      connection: local

    - name: Capture the device configuration
      ansible.builtin.include_role:
        name: david_igou.routeros_configuration.export_vars
