---
- name: Converge — fetch a file onto the device
  hosts: molecule
  gather_facts: false
  vars:
    # The device's own web service is always reachable from itself.
    routeros_fetch:
      - url: "http://127.0.0.1/"
        dst_path: fetch-role-test.html
        mode: http
  roles:
    - role: david_igou.routeros_configuration.fetch
