---
platforms:
  - name: na

provisioner:
  name: ansible
  # Empty inventory args (migrated to ansible.executor.args.ansible_playbook)
  # override the CHR inventory that extensions/molecule/config.yml centralises:
  # this is a localhost-only smoke scenario with no CHR host, so it must not
  # inherit the shared utils/inventory fixture.
  ansible_args: []
  playbooks:
    cleanup: ../utils/playbooks/noop.yml
    converge: ../utils/playbooks/converge.yml
    destroy: ../utils/playbooks/noop.yml
    prepare: ../utils/playbooks/noop.yml
  config_options:
    defaults:
      collections_path: ${ANSIBLE_COLLECTIONS_PATH}
scenario:
  test_sequence:
    - prepare
    - converge
  destroy_sequence:
    - destroy
