---
# Provisioner wiring (inventory + create/destroy/prepare/converge/verify
# playbooks) is centralised in extensions/molecule/config.yml and merged in by
# molecule. This file only declares what is unique to the scenario.
scenario:
  name: ip_address
  test_sequence:
    - dependency
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy

verifier:
  name: ansible
