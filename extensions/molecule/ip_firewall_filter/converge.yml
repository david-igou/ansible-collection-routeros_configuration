---
# NOTE: this applies a drop rule on the input chain with purge+order. rule-b
# MUST accept the management ports (SSH 22 + API 8728) or the verify step's new
# API connection — and idempotence's re-converge — would be dropped, locking the
# test out of the device.
- name: Converge — apply ordered firewall filter rules
  hosts: molecule
  gather_facts: false
  vars:
    routeros_ip_firewall_filter:
      - chain: input
        action: accept
        connection-state: "established,related"
        comment: "rule-a"
      - chain: input
        action: accept
        protocol: tcp
        dst-port: "22,8728"
        comment: "rule-b"
      - chain: input
        action: drop
        comment: "rule-c"
    routeros_ip_firewall_filter_purge: true
    routeros_ip_firewall_filter_order: true
  roles:
    - role: david_igou.routeros_configuration.ip_firewall_filter
