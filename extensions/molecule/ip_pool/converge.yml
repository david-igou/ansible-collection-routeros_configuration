---
- name: Converge — create two IP pools
  hosts: molecule
  gather_facts: false
  vars:
    routeros_ip_pool:
      - name: pool-a
        ranges: "192.168.60.10-192.168.60.50"
      - name: pool-b
        ranges: "192.168.61.10-192.168.61.50"
  roles:
    - role: david_igou.routeros_configuration.ip_pool
