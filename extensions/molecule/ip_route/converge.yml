---
- name: Converge — add a disabled static route
  hosts: molecule
  gather_facts: false
  vars:
    # A disabled route with an explicit gateway is stored verbatim without
    # needing a reachable next hop (the ephemeral CHR has no routable uplink)
    # and round-trips idempotently. A `blackhole` route is NOT idempotent here:
    # RouterOS stores the flag as "" while api_modify sends true, so the second
    # converge always reports a change.
    routeros_ip_route:
      - dst-address: "10.99.0.0/24"
        gateway: "192.0.2.1"
        disabled: true
        comment: "route-test"
  roles:
    - role: david_igou.routeros_configuration.ip_route
