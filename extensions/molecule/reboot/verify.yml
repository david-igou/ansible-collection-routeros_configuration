---
- name: Verify — the device rebooted (uptime reset)
  hosts: molecule
  gather_facts: false
  tasks:
    - name: Read system resource
      community.routeros.api:
        hostname: "{{ routeros_api_hostname }}"
        username: "{{ routeros_api_username }}"
        password: "{{ routeros_api_password }}"
        tls: "{{ routeros_api_tls }}"
        validate_certs: "{{ routeros_api_validate_certs }}"
        port: "{{ routeros_api_port | default(omit, true) }}"
        path: system resource
      delegate_to: localhost
      connection: local
      register: res
    - name: Compute uptime in seconds
      ansible.builtin.set_fact:
        _uptime_s: >-
          {{ ((res.msg | first).uptime | regex_findall('([0-9]+)s') | map('int') | sum)
             + ((res.msg | first).uptime | regex_findall('([0-9]+)m') | map('int') | sum) * 60
             + ((res.msg | first).uptime | regex_findall('([0-9]+)h') | map('int') | sum) * 3600
             + ((res.msg | first).uptime | regex_findall('([0-9]+)d') | map('int') | sum) * 86400
             + ((res.msg | first).uptime | regex_findall('([0-9]+)w') | map('int') | sum) * 604800 }}
    - name: Assert uptime is small (recently rebooted)
      ansible.builtin.assert:
        that:
          - _uptime_s | int < 180
        success_msg: "device rebooted — uptime {{ (res.msg | first).uptime }} ({{ _uptime_s }}s)"
        fail_msg: "uptime too high, did it reboot? {{ (res.msg | first).uptime }}"
