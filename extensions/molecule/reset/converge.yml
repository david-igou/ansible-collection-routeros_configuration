---
- name: Converge — reset role with the gate OFF (must not reset)
  hosts: molecule
  gather_facts: false
  module_defaults:
    # One block covers every community.routeros api* module via the
    # collection's `api` action group.
    group/community.routeros.api:
      hostname: "{{ routeros_api_hostname }}"
      username: "{{ routeros_api_username }}"
      password: "{{ routeros_api_password }}"
      tls: "{{ routeros_api_tls }}"
      validate_certs: "{{ routeros_api_validate_certs }}"
      port: "{{ routeros_api_port | default(omit, true) }}"
  tasks:
    - name: Set a recognizable identity (a reset would wipe it)
      community.routeros.api_modify:
        path: system identity
        data:
          - name: reset-gate-test
      delegate_to: localhost
      connection: local
    - name: Run the reset role unconfirmed (default — should do nothing)
      ansible.builtin.include_role:
        name: david_igou.routeros_configuration.reset
