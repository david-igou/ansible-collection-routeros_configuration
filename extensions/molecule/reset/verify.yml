---
- name: Verify — the gate held (no reset; identity intact, device alive)
  hosts: molecule
  gather_facts: false
  module_defaults:
    # One block covers every community.routeros api* module via the
    # collection's `api` action group.
    group/community.routeros.api:
      hostname: "{{ routeros_api_hostname }}"
      username: "{{ routeros_api_username }}"
      password: "{{ routeros_api_password }}"
      tls: "{{ routeros_api_tls }}"
      validate_certs: "{{ routeros_api_validate_certs }}"
      port: "{{ routeros_api_port | default(omit, true) }}"
  tasks:
    - name: Read identity
      community.routeros.api:
        path: system identity
      delegate_to: localhost
      connection: local
      register: ident
    - name: Assert the config was NOT reset
      ansible.builtin.assert:
        that:
          - (ident.msg | first).name == 'reset-gate-test'
        success_msg: "reset gate held — identity intact, no reset"
        fail_msg: "unexpected identity (was it reset?): {{ ident.msg }}"
