---
- name: Converge — apply system_identity
  hosts: molecule
  gather_facts: false
  vars:
    # Avoid embedding the admin password ("molecule") in test data — Ansible's
    # no_log masking would scrub the substring and confound the verify assert.
    routeros_system_identity:
      - name: chr-undertest
  roles:
    - role: david_igou.routeros_configuration.system_identity
