---
- name: Verify — the test user authenticates with the new password
  hosts: molecule
  gather_facts: false
  tasks:
    - name: Authenticate as pwtest with the rotated password
      community.routeros.api:
        hostname: "{{ routeros_api_hostname }}"
        username: pwtest
        password: "rotated-pw-456"
        tls: "{{ routeros_api_tls }}"
        validate_certs: "{{ routeros_api_validate_certs }}"
        port: "{{ routeros_api_port | default(omit, true) }}"
        path: system identity
      delegate_to: localhost
      connection: local
      register: au
    - name: Assert authentication succeeded
      ansible.builtin.assert:
        that:
          - au is succeeded
          - (au.msg | first).name is defined
        success_msg: "pwtest authenticated with the rotated password"
        fail_msg: "auth failed"
