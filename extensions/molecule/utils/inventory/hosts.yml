---
# Shared CHR host for the api_modify role scenarios. net0 (ether1) is the
# provisioner's SSH/DHCP NIC. We add ONE extra SLIRP netdev "apinet" (ether2)
# that forwards host TCP 8728 -> guest 8728 (the RouterOS binary API). prepare
# enables a dhcp-client on ether2 so the guest holds 10.0.2.15 for the forward
# to land on, and enables the api service.
#
# net2..net7 below add ether3..ether8 (no hostfwd) so interface/bridge/bonding/
# vlan and list-style scenarios have spare ports to bind to. They need no host
# L2 reachability — the ports just have to exist in RouterOS.
all:
  children:
    molecule:
      hosts:
        chr-1:
          mp:
            qemu:
              image: "https://download.mikrotik.com/routeros/7.21.4/chr-7.21.4.img.zip"
              ssh_user: admin
              cpus: 1
              memory: 512
              extra_args:
                # apinet gets its OWN SLIRP subnet (10.0.3.0/24) so ether2's
                # DHCP address differs from ether1's default 10.0.2.15. Sharing
                # 10.0.2.0/24 on both NICs makes RouterOS send the API SYN-ACK
                # out the wrong interface (routing ambiguity) and the handshake
                # times out even though the TCP port appears open. The hostfwd
                # targets ether2's address (10.0.3.15) explicitly.
                - -netdev
                - "user,id=apinet,net=10.0.3.0/24,hostfwd=tcp::8728-10.0.3.15:8728"
                - -device
                - "virtio-net-pci,netdev=apinet,mac=52:54:00:00:01:02"
                - -netdev
                - "user,id=net2"
                - -device
                - "virtio-net-pci,netdev=net2,mac=52:54:00:00:01:03"
                - -netdev
                - "user,id=net3"
                - -device
                - "virtio-net-pci,netdev=net3,mac=52:54:00:00:01:04"
                - -netdev
                - "user,id=net4"
                - -device
                - "virtio-net-pci,netdev=net4,mac=52:54:00:00:01:05"
                - -netdev
                - "user,id=net5"
                - -device
                - "virtio-net-pci,netdev=net5,mac=52:54:00:00:01:06"
                - -netdev
                - "user,id=net6"
                - -device
                - "virtio-net-pci,netdev=net6,mac=52:54:00:00:01:07"
                - -netdev
                - "user,id=net7"
                - -device
                - "virtio-net-pci,netdev=net7,mac=52:54:00:00:01:08"
