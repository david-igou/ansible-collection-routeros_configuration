---
# This collection is initialized by https://github.com/ansible/ansible-creator 26.4.3

# See https://docs.ansible.com/ansible/latest/dev_guide/collections_galaxy_meta.html

namespace: "david_igou"
name: "routeros_configuration"
version: 0.0.8-alpha
readme: README.md
authors:
  - David Igou <igou.david@gmail.com>

description: >-
  Ansible collection for declaratively managing the state of MikroTik RouterOS
  devices. Early-stage 0.0.x — expect breaking changes between releases.
license_file: LICENSE

tags:
  - networking
  - infrastructure
  - routeros
  - mikrotik

# Runtime dependencies. community.routeros (over ansible.netcommon network_cli)
# is the management interface for RouterOS. ansible.utils arrives transitively
# via ansible.netcommon and is deliberately NOT declared — nothing here imports
# it directly. Test-only deps (the molecule provisioners) are NOT here — see
# extensions/molecule/requirements-test.yml.
dependencies:
  "community.routeros": ">=3.0.0"
  "ansible.netcommon": ">=8.0.0"

repository: https://github.com/david-igou/ansible-collection-routeros_configuration
documentation: https://david-igou.github.io/ansible-collection-routeros_configuration/branch/main/
homepage: https://github.com/david-igou/ansible-collection-routeros_configuration
issues: https://github.com/david-igou/ansible-collection-routeros_configuration/issues

# A list of file glob-like patterns used to filter any files or directories that should not be included in the build
# artifact. A pattern is matched from the relative path of the file or directory of the collection directory. This
# uses 'fnmatch' to match the files or directories. Some directories and files like 'galaxy.yml', '*.pyc', '*.retry',
# and '.git' are always filtered. Mutually exclusive with 'manifest'
build_ignore:
  - .ansible
  - .ansible-lint
  - .claude
  - .devcontainer
  - .github
  - .gitignore
  - .isort.cfg
  - .pre-commit-config.yaml
  - .prettierignore
  - .pytest_cache
  - .vscode
  - AGENTS.md
  - Makefile
  - ansible.cfg
  - changelogs/.plugin-cache.yaml
  - devfile.yaml
  - docs/superpowers
  - extensions
  - pyproject.toml
  - requirements.txt
  - test-requirements.txt
  - tox-ansible.ini
# A dict controlling use of manifest directives used in building the collection artifact. The key 'directives' is a
# list of MANIFEST.in style
# L(directives,https://packaging.python.org/en/latest/guides/using-manifest-in/#manifest-in-commands). The key
# 'omit_default_directives' is a boolean that controls whether the default directives are used. Mutually exclusive
# with 'build_ignore'
# manifest: null
