[tool.black]
line-length = 100

[tool.pytest.ini_options]
addopts = ["-vvv", "-n", "2", "--log-level", "WARNING", "--color", "yes"]
filterwarnings = ["ignore:AnsibleCollectionFinder has already been configured"]
# Unit tests only — molecule scenarios run exclusively through the Makefile
# (`make molecule*`), which owns scenario ordering and shared-state invariants.
testpaths = ["tests/unit"]
