---
argument_specs:
  main:
    short_description: Back up RouterOS configuration over network_cli.
    description:
      - Writes a text configuration export (C(/export)) to a file on the Ansible
        controller, rewriting it only when the device config changed (idempotent).
      - Optionally takes a full-fidelity binary backup (C(/system backup save)) on
        the device.
      - Runs over network_cli (C(community.routeros.command)); C(/export) is not
        available over the binary API.
    examples: |
      # The text /export runs over network_cli (SSH); the device must be reachable
      # over an SSH connection (see the getting started guide).
      #
      # Export the running config to the controller as <inventory_hostname>.rsc,
      # rewritten only when the device config changed (idempotent).
      - hosts: routers
        gather_facts: false
        roles:
          - role: david_igou.routeros_configuration.backup
            vars:
              routeros_backup_dir: ./routeros-backups

      # Include service secrets and scope the export to a menu path.
      - hosts: routers
        gather_facts: false
        roles:
          - role: david_igou.routeros_configuration.backup
            vars:
              routeros_backup_show_sensitive: true
              routeros_backup_export_options: ip firewall

      # Also take an encrypted binary backup on the device (password via Vault).
      - hosts: routers
        gather_facts: false
        roles:
          - role: david_igou.routeros_configuration.backup
            vars:
              routeros_backup_binary: true
              routeros_backup_name: nightly
              routeros_backup_password: "{{ vault_routeros_backup_password }}"
    options:
      routeros_backup_dir:
        type: str
        default: ./routeros-backups
        description:
          - Controller directory for the C(.rsc) export, one file per host
            (C(<inventory_hostname>.rsc)).
      routeros_backup_show_sensitive:
        type: bool
        default: true
        description:
          - Run C(/export show-sensitive) to include service secrets. C(/export)
            still never includes C(/user) passwords, certificates, SSH keys, Dude,
            or the User-manager database.
      routeros_backup_export_options:
        type: str
        default: ""
        description:
          - Extra arguments appended to C(/export) (e.g. a menu path like
            C(ip firewall), or C(terse)).
      routeros_backup_binary:
        type: bool
        default: false
        description:
          - Also take a binary backup (C(/system backup save)) on the device.
            Restore with C(/system backup load). Stays on the device.
      routeros_backup_name:
        type: str
        default: ansible
        description: Binary backup file name.
      routeros_backup_password:
        type: str
        default: ""
        description:
          - Encryption password for the binary backup. Secret — supply via
            vault. Recommended, as the binary backup contains sensitive data.
