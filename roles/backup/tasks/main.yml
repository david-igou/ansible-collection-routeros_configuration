---
# tasks file for david_igou.routeros_configuration.backup
#
# Runs over network_cli (community.routeros.command): /export is a console-only
# command, not reachable over the binary API. The caller supplies the network_cli
# connection (see README); the controller-side tasks delegate to localhost.

- name: Ensure the backup directory exists on the controller
  ansible.builtin.file:
    path: "{{ routeros_backup_dir }}"
    state: directory
    mode: "0700"
  delegate_to: localhost

- name: Export the running configuration (text, on the device console)
  community.routeros.command:
    commands:
      - >-
        /export{{ ' show-sensitive' if (routeros_backup_show_sensitive | bool) else '' }}{{
        (' ' ~ routeros_backup_export_options) if routeros_backup_export_options else '' }}
  register: _routeros_export
  # Reading the configuration is not a change; the controller copy below carries
  # the only real idempotency signal.
  changed_when: false

- name: Assemble the export without the volatile timestamp header line
  # /export's first line is "# <date> by RouterOS <ver>", which changes every
  # run; dropping it makes the written file content-stable (idempotent). Other
  # header lines (software id / model / serial) are stable and kept.
  ansible.builtin.set_fact:
    _routeros_backup_content: >-
      {{ (_routeros_export.stdout_lines[0] | reject('search', 'by RouterOS') | join('\n')) ~ '\n' }}

- name: Write the export to the controller
  ansible.builtin.copy:
    content: "{{ _routeros_backup_content }}"
    dest: "{{ routeros_backup_dir }}/{{ inventory_hostname }}.rsc"
    mode: "0600"
  delegate_to: localhost

- name: Take a binary backup on the device
  # Full-fidelity, on-device, restorable with /system backup load. Treated as a
  # non-reporting action (the standard backup idiom) so the role stays idempotent
  # even though a fresh point-in-time file is written each run.
  community.routeros.command:
    commands:
      - >-
        /system backup save name={{ routeros_backup_name }}{{
        (' password=' ~ routeros_backup_password) if routeros_backup_password else '' }}
  changed_when: false
  no_log: "{{ (routeros_backup_password | length) > 0 }}"
  when: routeros_backup_binary | bool
