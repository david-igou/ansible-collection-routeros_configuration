---
# Shared connection to the RouterOS binary API. Override per host/group.
# In production prefer TLS (api-ssl, port 8729) with validate_certs: true.
routeros_api_hostname: "{{ inventory_hostname }}"
routeros_api_username: admin
# Intentionally left undefined (no default): supply it via vault/group_vars.
# routeros_api_password: "{{ vault_routeros_api_password }}"
routeros_api_tls: true
routeros_api_validate_certs: true
# Leave empty to let the module pick the port from `tls` (8728/8729).
routeros_api_port: ""

# Certificates to create and sign. Each entry:
#   name:        certificate name (required)
#   common_name: certificate CN (required)
#   key_size:    RSA key size (default 2048)
#   days_valid:  validity in days (default 365)
#   key_usage:   list of key usages (optional; e.g. [key-cert-sign, crl-sign] for a CA)
#   ca:          name of the signing CA certificate (optional; omitted -> self-signed)
routeros_certificates: []

# Certificates to export to files on the device. Each:
#   name (required), file_name? (default = name), type? (pem|pkcs12), export_passphrase?
routeros_certificates_export: []

# Certificates to import from files. Each:
#   file_name (required), name?, passphrase?
routeros_certificates_import: []

# ACME (Let's Encrypt) requests. Each: { args: "<add-acme arguments>" }.
# Gated/untested on a CHR (needs a public domain + DNS challenge).
routeros_acme: []
