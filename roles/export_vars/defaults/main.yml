---
# Shared connection to the RouterOS binary API. Override per host/group.
routeros_api_hostname: "{{ inventory_hostname }}"
routeros_api_username: admin
# Intentionally left undefined (no default): supply it via vault/group_vars.
# routeros_api_password: "{{ vault_routeros_api_password }}"
routeros_api_tls: true
routeros_api_validate_certs: true
routeros_api_port: ""

# Controller directory for the captured vars files (one per host:
# <inventory_hostname>.yml, containing a top-level routeros_config key).
routeros_export_vars_dir: ./routeros-vars

# Replace sensitive field values (keys, PSKs, passwords) with REDACTED. Off by
# default so the captured config round-trips — the output then contains secrets,
# so ansible-vault encrypt it.
routeros_export_vars_redact: false

# How api_info represents fields that are unset on the device. Passed straight
# to community.routeros.api_info's handle_disabled:
#   omit        - leave unset fields out (default). Captures only what is actually
#                 configured — the cleanest baseline to review and re-apply.
#   exclamation - keep them as "!field: null" markers. The configure role reads
#                 "!field" as reset-to-default, so use this when the capture
#                 should also force unset fields back to default on apply.
#   null-value  - emit "field: null".
routeros_export_vars_handle_disabled: omit

# routeros_export_vars_paths is intentionally NOT defaulted here: when it is
# undefined, tasks/main.yml loads the configure role's canonical rcfg_path_order
# (every configurable path). Set it to a subset (slash paths) to capture only
# certain paths — much faster than querying all 508.
