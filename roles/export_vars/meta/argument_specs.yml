---
argument_specs:
  main:
    short_description: Capture a running device's config into a routeros_config vars file.
    description:
      - The reverse of the C(configure) role. Reads the device over the API
        (C(community.routeros.api_info)) and writes a per-host vars file containing
        a C(routeros_config) dict that the C(configure) role can re-apply.
      - Captured fields are a best-effort equivalent; review before re-applying.
    examples: |
      # Capture the full configuration. Writes <inventory_hostname>.yml with a
      # routeros_config dict that the configure role can re-apply.
      - hosts: routers
        gather_facts: false
        roles:
          - role: david_igou.routeros_configuration.export_vars
            vars:
              routeros_export_vars_dir: ./routeros-vars

      # Capture a focused set of paths for a fast, targeted snapshot. Paths with
      # no entries are omitted from the output.
      - hosts: routers
        gather_facts: false
        roles:
          - role: david_igou.routeros_configuration.export_vars
            vars:
              routeros_export_vars_paths:
                - /ip/address
                - /system/identity

      # Redact secrets (keys, PSKs, passwords) as REDACTED. The output no longer
      # round-trips; prefer encrypting the unredacted file with Ansible Vault.
      - hosts: routers
        gather_facts: false
        roles:
          - role: david_igou.routeros_configuration.export_vars
            vars:
              routeros_export_vars_redact: true
    options:
      routeros_export_vars_dir:
        type: str
        default: ./routeros-vars
        description:
          - Controller directory for the captured C(<inventory_hostname>.yml) files.
      routeros_export_vars_paths:
        type: list
        elements: str
        description:
          - Slash paths to capture. When unset, defaults to the configure role's
            full C(rcfg_path_order) (every configurable path). Paths with no
            entries are omitted from the output.
      routeros_export_vars_redact:
        type: bool
        default: false
        description:
          - Replace sensitive field values (keys, PSKs, passwords) with C(REDACTED).
            Off by default so the output round-trips; encrypt the file with vault.
      routeros_export_vars_handle_disabled:
        type: str
        default: omit
        choices:
          - omit
          - exclamation
          - null-value
        description:
          - How C(community.routeros.api_info) represents fields that are unset on
            the device. V(omit) (default) leaves them out, capturing only what is
            configured. V(exclamation) keeps them as C(!field) markers (the
            C(configure) role reads these as reset-to-default). V(null-value)
            emits C(field=null).
      routeros_export_vars_exclude_paths:
        type: list
        elements: str
        description:
          - Slash paths to exclude from the export even when they are
            configure-modifiable — paths that capture runtime state, hardware
            enumeration, or auto-generated defaults rather than intent.
          - 'Default: C(/file) (filesystem listing), C(/certificate) (metadata
            only, no key material — cannot round-trip), C(/ip/cloud),
            C(/queue/interface) (auto-generated per interface), and
            C(/system/resource/irq/rps) (hardware state). Set to C([]) to
            capture everything.'
      routeros_export_vars_exclude_paths_extra:
        type: list
        elements: str
        default: []
        description:
          - Additional slash paths to exclude, merged onto
            O(routeros_export_vars_exclude_paths) rather than replacing it. Use
            this to drop a few more paths without re-listing the defaults.
      routeros_export_vars_ordered_paths:
        type: list
        elements: str
        description:
          - Slash paths whose entry order is significant (firewall chains,
            routing filters, simple queues). Captured with C(order=true),
            C(purge=true) and C(content) so the C(configure) role enforces the
            exact ordered state.
          - 'Default: the IPv4/IPv6 firewall chains (filter, nat, mangle, raw),
            C(/routing/filter/rule) and C(/queue/simple) — the known
            order-sensitive RouterOS paths.'
      routeros_export_vars_ordered_content:
        type: str
        default: remove_as_much_as_possible
        choices:
          - remove_as_much_as_possible
          - remove
        description:
          - The C(content) (handle_entries_content) emitted for ordered paths.
            With C(purge), C(api_modify) rejects the default C(ignore) on these
            paths, so it must be pinned. V(remove_as_much_as_possible) (default)
            resets removable fields and leaves unrecognized fields alone;
            V(remove) is strict.
      routeros_export_vars_volatile_fields:
        type: dict
        description:
          - Per-path fields stripped from the capture. Keys are slash paths,
            values are lists of field names. Drop a field here when it is either
            volatile device state (not config) or a value that breaks
            C(api_modify)'s round-trip matching. Defaults to dropping
            C(date)/C(time) from C(/system/clock) (volatile) and C(group) from
            C(/ip/ipsec/policy) (its C(group) C(remove_value) is C(default), so a
            captured C(group) of C(default) is misread as a disable, causing a
            duplicate add).
      routeros_api_hostname:
        type: str
        default: "{{ inventory_hostname }}"
        description: API hostname/IP of the device.
      routeros_api_username:
        type: str
        default: admin
        description: API username.
      routeros_api_password:
        type: str
        description: API password. Secret — supply via vault. The module marks it no_log.
      routeros_api_tls:
        type: bool
        default: true
        description: Use TLS (api-ssl).
      routeros_api_validate_certs:
        type: bool
        default: true
        description: Validate the device TLS certificate.
      routeros_api_port:
        type: raw
        default: ""
        description: TCP port; empty lets the module choose from tls.
