---
# tasks file for david_igou.routeros_configuration.export_vars
#
# The reverse of the configure role: read a running device over the API and write
# an equivalent routeros_config vars file to the controller. Idempotent — only
# the controller copy reports changed, and only when the captured config differs.

- name: Load the canonical configure path order (the configure-modifiable set)
  # rcfg_path_order is every path the configure role can write via api_modify
  # (read-only/status paths are excluded). export_vars only captures paths from
  # this set so the result re-applies cleanly through configure — always loaded,
  # not just for a full export, so it can also filter an explicit path list.
  ansible.builtin.include_vars:
    file: "{{ role_path }}/../configure/vars/main.yml"

- name: Restrict the export to configure-modifiable, non-state paths
  ansible.builtin.set_fact:
    # Effective capture list: requested paths (or the full canonical order)
    # intersected with rcfg_path_order, minus the runtime/state exclusions
    # (the curated default list merged with the per-run extra list).
    _export_vars_paths: >-
      {{ routeros_export_vars_paths | default(rcfg_path_order)
         | select('in', rcfg_path_order)
         | reject('in', routeros_export_vars_exclude_paths
                        + routeros_export_vars_exclude_paths_extra)
         | list }}
    # Requested paths the configure role cannot modify at all.
    _export_vars_unmodifiable: >-
      {{ routeros_export_vars_paths | default([])
         | reject('in', rcfg_path_order) | list }}
    # Paths skipped because they capture runtime/hardware state, not config.
    _export_vars_excluded: >-
      {{ routeros_export_vars_paths | default(rcfg_path_order)
         | select('in', rcfg_path_order)
         | select('in', routeros_export_vars_exclude_paths
                        + routeros_export_vars_exclude_paths_extra)
         | list }}

- name: Report requested paths the configure role cannot modify (skipped)
  ansible.builtin.debug:
    msg: >-
      export_vars skipped {{ _export_vars_unmodifiable | length }} requested
      path(s) the configure role cannot modify:
      {{ _export_vars_unmodifiable | join(', ') }}
  when: _export_vars_unmodifiable | length > 0

- name: Report paths excluded as runtime/hardware state (not declarative config)
  ansible.builtin.debug:
    msg: >-
      export_vars excluded {{ _export_vars_excluded | length }} state/runtime
      path(s) (routeros_export_vars_exclude_paths):
      {{ _export_vars_excluded | join(', ') }}
  when: _export_vars_excluded | length > 0

- name: Capture the device configuration
  delegate_to: localhost
  connection: local
  module_defaults:
    community.routeros.api_info:
      hostname: "{{ routeros_api_hostname }}"
      username: "{{ routeros_api_username }}"
      password: "{{ routeros_api_password }}"
      tls: "{{ routeros_api_tls | bool }}"
      validate_certs: "{{ routeros_api_validate_certs | bool }}"
      port: "{{ routeros_api_port | default(omit, true) }}"
  block:
    - name: Ensure the output directory exists on the controller
      ansible.builtin.file:
        path: "{{ routeros_export_vars_dir }}"
        state: directory
        mode: "0700"

    - name: Read each path from the device (persistent config only)
      community.routeros.api_info:  # noqa: args[module]
        path: "{{ item | replace('/', ' ') | trim }}"
        hide_defaults: true
        include_dynamic: false
        include_read_only: false
        handle_disabled: "{{ routeros_export_vars_handle_disabled }}"
      loop: "{{ _export_vars_paths }}"
      loop_control:
        label: "{{ item }}"
      register: _captured
      changed_when: false
      # No device implements the whole canonical path set — wireless, CAPsMAN,
      # container, LoRa, etc. are absent on most models and RouterOS builds. When
      # a path is not present api_info errors with "not supported" (api_info's
      # own version gate) or "no such command" (the device rejects it). A third
      # class also exists: paths the schema accepts but the device's read
      # implementation is broken, which returns the RouterOS "contact MikroTik
      # support and send a supout file" sentinel (historically seen under
      # /routing/pimsm/*, occasional /interface/* edges, etc.). Tolerate all
      # three so a full export over the entire canonical order completes;
      # such a path is simply omitted from the captured config (the
      # to_routeros_config filter skips results with no entries). Any other
      # failure — auth, connection, TLS — is real and still aborts the play.
      failed_when: >-
        _captured.failed | default(false)
        and 'not supported' not in (_captured.msg | default(''))
        and 'no such command' not in (_captured.msg | default(''))
        and 'contact MikroTik support' not in (_captured.msg | default(''))

    - name: Report paths the device does not implement (skipped, not captured)
      ansible.builtin.debug:
        msg: >-
          export_vars skipped {{ _export_vars_skipped | length }} path(s) this
          device does not implement: {{ _export_vars_skipped | join(', ') }}
      vars:
        _export_vars_skipped: >-
          {{ _captured.results
             | rejectattr('result', 'defined')
             | map(attribute='item')
             | list }}
      when: _export_vars_skipped | length > 0

    - name: Write the routeros_config vars file
      ansible.builtin.copy:
        content: >-
          {{ {'routeros_config':
             (_captured.results
              | david_igou.routeros_configuration.to_routeros_config(
                  redact=routeros_export_vars_redact | bool,
                  volatile_fields=routeros_export_vars_volatile_fields,
                  ordered_paths=routeros_export_vars_ordered_paths))}
             | to_nice_yaml(indent=2) }}
        dest: "{{ routeros_export_vars_dir }}/{{ inventory_hostname }}.yml"
        mode: "0600"
