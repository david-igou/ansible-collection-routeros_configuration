---
argument_specs:
  main:
    short_description: Gather RouterOS device facts over the API.
    description:
      - Runs C(community.routeros.api_facts) and sets C(ansible_net_*) facts.
    options:
      routeros_facts_subset:
        type: list
        elements: str
        default:
          - all
        description: Fact subsets to gather (see community.routeros.api_facts).
      routeros_api_hostname:
        type: str
        default: "{{ inventory_hostname }}"
        description: API hostname/IP of the device.
      routeros_api_username:
        type: str
        default: admin
        description: API username.
      routeros_api_password:
        type: str
        description: API password. Secret — supply via vault.
      routeros_api_tls:
        type: bool
        default: true
        description: Use TLS (api-ssl).
      routeros_api_validate_certs:
        type: bool
        default: true
        description: Validate the device TLS certificate.
      routeros_api_port:
        type: raw
        default: ""
        description: TCP port; empty lets the module choose from tls.
