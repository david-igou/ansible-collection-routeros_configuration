---
argument_specs:
  main:
    short_description: Transfer files to/from RouterOS via /tool fetch.
    description:
      - Downloads/uploads files with C(/tool fetch) and removes files with C(/file remove).
    examples: |
      # Download a file onto the device over HTTPS.
      - hosts: routers
        gather_facts: false
        roles:
          - role: david_igou.routeros_configuration.fetch
            vars:
              routeros_fetch:
                - url: https://example.com/firmware.npk
                  dst_path: firmware.npk
                  mode: https

      # Download a file, and clean up a stale one with routeros_fetch_remove.
      - hosts: routers
        gather_facts: false
        roles:
          - role: david_igou.routeros_configuration.fetch
            vars:
              routeros_fetch:
                - url: https://config.example.com/edge.rsc
                  dst_path: edge.rsc
                  mode: https
              routeros_fetch_remove:
                - old-edge.rsc

      # Fetch over SFTP with extra arguments (appended verbatim); set no_log when
      # the URL or arguments carry a credential.
      - hosts: routers
        gather_facts: false
        roles:
          - role: david_igou.routeros_configuration.fetch
            vars:
              routeros_fetch:
                - url: sftp://files.example.com/backup.rsc
                  dst_path: backup.rsc
                  mode: sftp
                  extra: "user=svc password={{ vault_sftp_password }}"
                  no_log: true
    options:
      routeros_fetch:
        type: list
        elements: dict
        default: []
        description: Files to fetch.
        options:
          url:
            type: str
            required: true
            description: Source URL.
          dst_path:
            type: str
            required: true
            description: Destination file name on the device.
          mode:
            type: str
            default: http
            choices:
              - http
              - https
              - ftp
              - tftp
              - sftp
            description: Transfer mode (http/https/ftp/tftp/sftp).
          extra:
            type: str
            description: Extra fetch arguments appended verbatim.
          no_log:
            type: bool
            default: false
            description: Hide this fetch from logs (set when the URL/extra carries a secret).
      routeros_fetch_remove:
        type: list
        elements: str
        default: []
        description: File names to delete from the device.
      routeros_api_hostname:
        type: str
        default: "{{ inventory_hostname }}"
        description: API hostname/IP of the device.
      routeros_api_username:
        type: str
        default: admin
        description: API username.
      routeros_api_password:
        type: str
        description: API password. Secret — supply via vault.
      routeros_api_tls:
        type: bool
        default: true
        description: Use TLS (api-ssl).
      routeros_api_validate_certs:
        type: bool
        default: true
        description: Validate the device TLS certificate.
      routeros_api_port:
        type: raw
        default: ""
        description: TCP port; empty lets the module choose from tls.
