---
# tasks file for david_igou.routeros_configuration.interface_bridge_vlan
- name: "Reconcile interface bridge vlan"
  ansible.builtin.include_role:
    name: _reconcile
  vars:
    rcfg_path: interface bridge vlan
    rcfg_data: "{{ routeros_interface_bridge_vlan }}"
    rcfg_purge: "{{ routeros_interface_bridge_vlan_purge | default(false) }}"
    rcfg_order: false
