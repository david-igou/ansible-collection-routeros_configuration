---
argument_specs:
  main:
    short_description: Manage /ip/arp declaratively.
    options:
      routeros_ip_arp:
        type: list
        elements: dict
        default: []
        description: Static ARP entries (address, mac-address, interface, ...).
      routeros_ip_arp_purge:
        type: bool
        default: false
        description: Remove ARP entries not present in routeros_ip_arp.
