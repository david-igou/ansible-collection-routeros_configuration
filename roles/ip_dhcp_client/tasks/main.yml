---
# tasks file for david_igou.routeros_configuration.ip_dhcp_client
- name: "Reconcile ip dhcp-client"
  ansible.builtin.include_role:
    name: _reconcile
  vars:
    rcfg_path: ip dhcp-client
    rcfg_data: "{{ routeros_ip_dhcp_client }}"
    rcfg_purge: "{{ routeros_ip_dhcp_client_purge | default(false) }}"
    rcfg_order: false
