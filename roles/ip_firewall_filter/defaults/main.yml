---
# Ordered list of /ip/firewall/filter rules. Order matters; set _order: true
# (which also requires _purge: true) to enforce it exactly.
routeros_ip_firewall_filter: []
routeros_ip_firewall_filter_purge: false
routeros_ip_firewall_filter_order: false
# How to treat fields not present in a matched rule. This is an ORDERED path:
# api_modify forbids purge (_purge: true) while this stays "ignore", so the
# default resets unspecified fields — also making rules fully declarative.
routeros_ip_firewall_filter_content: remove_as_much_as_possible
