---
argument_specs:
  main:
    short_description: Manage /ip/vrf declaratively.
    options:
      routeros_ip_vrf:
        type: list
        elements: dict
        default: []
        description: VRF instances (name, interfaces, ...).
      routeros_ip_vrf_purge:
        type: bool
        default: false
        description: Remove VRFs not present in routeros_ip_vrf.
