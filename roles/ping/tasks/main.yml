---
# tasks file for david_igou.routeros_configuration.ping
# Connectivity checks via /tool ping over the API. Read-only; results in _routeros_ping.
- name: Ping over the RouterOS API
  delegate_to: localhost
  connection: local
  module_defaults:
    community.routeros.api:  # noqa: args[module]
      hostname: "{{ routeros_api_hostname }}"
      username: "{{ routeros_api_username }}"
      password: "{{ routeros_api_password }}"
      tls: "{{ routeros_api_tls | bool }}"
      validate_certs: "{{ routeros_api_validate_certs | bool }}"
      port: "{{ routeros_api_port | default(omit, true) }}"
  block:
    - name: Ping each target
      community.routeros.api:  # noqa: args[module]
        path: ""
        cmd: >-
          ping address={{ item.address | community.routeros.quote_argument_value }}
          count={{ item.count | default(4) }}{{
          (' interface=' ~ (item.interface | community.routeros.quote_argument_value)) if item.interface is defined else '' }}
      loop: "{{ routeros_ping }}"
      loop_control:
        label: "{{ item.address }}"
      register: _routeros_ping
      changed_when: false
