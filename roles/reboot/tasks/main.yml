---
# tasks file for david_igou.routeros_configuration.reboot
# Reboot (and wait) or shut down the device over the API.
- name: Reboot or shut down the device
  delegate_to: localhost
  connection: local
  module_defaults:
    community.routeros.api:  # noqa: args[module]
      hostname: "{{ routeros_api_hostname }}"
      username: "{{ routeros_api_username }}"
      password: "{{ routeros_api_password }}"
      tls: "{{ routeros_api_tls | bool }}"
      validate_certs: "{{ routeros_api_validate_certs | bool }}"
      port: "{{ routeros_api_port | default(omit, true) }}"
  block:
    - name: Reboot the device
      community.routeros.api:  # noqa: args[module]
        path: system
        cmd: reboot
      changed_when: true
      when:
        - routeros_reboot | bool
        - not (routeros_shutdown | bool)

    - name: Wait for the API to return after the reboot
      ansible.builtin.wait_for:
        host: "{{ routeros_api_hostname }}"
        port: "{{ routeros_api_port | default((8729 if routeros_api_tls | bool else 8728), true) }}"
        timeout: "{{ routeros_reboot_timeout }}"
        delay: 15
      when:
        - routeros_reboot | bool
        - not (routeros_shutdown | bool)

    - name: Wait for the API to actually answer (port opens before login is ready)
      community.routeros.api:  # noqa: args[module]
        path: system identity
      register: _reboot_api_ready
      until: _reboot_api_ready is succeeded
      retries: 40
      delay: 5
      changed_when: false
      when:
        - routeros_reboot | bool
        - not (routeros_shutdown | bool)

    - name: Shut down the device (gated — powers off, no reconnect wait)
      community.routeros.api:  # noqa: args[module]
        path: system
        cmd: shutdown
      changed_when: true
      when: routeros_shutdown | bool
