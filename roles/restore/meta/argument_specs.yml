---
argument_specs:
  main:
    short_description: Restore a RouterOS device from a backup or config import.
    description:
      - Loads a binary backup (C(/system backup load), reboots) and/or imports a
        config script (C(/import)). The reverse of the backup role.
    examples: |
      # Restore from a binary backup (loads it and reboots, waiting for the API).
      - hosts: routers
        gather_facts: false
        roles:
          - role: david_igou.routeros_configuration.restore
            vars:
              routeros_restore_backup_name: nightly
              routeros_restore_backup_password: "{{ vault_routeros_backup_password }}"

      # Import a configuration script with /import (no reboot).
      - hosts: routers
        gather_facts: false
        roles:
          - role: david_igou.routeros_configuration.restore
            vars:
              routeros_restore_import_file: edge-router.rsc

      # Load a backup (reboot), then import a script; raise the reboot timeout for
      # a device that is slow to come back.
      - hosts: routers
        gather_facts: false
        roles:
          - role: david_igou.routeros_configuration.restore
            vars:
              routeros_restore_backup_name: nightly
              routeros_restore_backup_password: "{{ vault_routeros_backup_password }}"
              routeros_restore_import_file: extra-tweaks.rsc
              routeros_restore_reboot_timeout: 600
    options:
      routeros_restore_backup_name:
        type: str
        default: ""
        description: On-device binary backup name (without .backup). Empty = skip.
      routeros_restore_backup_password:
        type: str
        default: ""
        description: Backup decryption password.
      routeros_restore_import_file:
        type: str
        default: ""
        description: On-device .rsc file to import. Empty = skip.
      routeros_restore_reboot_timeout:
        type: int
        default: 300
        description: Seconds to wait for the API after a backup-load reboot.
      routeros_api_hostname:
        type: str
        default: "{{ inventory_hostname }}"
        description: API hostname/IP of the device.
      routeros_api_username:
        type: str
        default: admin
        description: API username.
      routeros_api_password:
        type: str
        description: API password. Secret — supply via vault.
      routeros_api_tls:
        type: bool
        default: true
        description: Use TLS (api-ssl).
      routeros_api_validate_certs:
        type: bool
        default: true
        description: Validate the device TLS certificate.
      routeros_api_port:
        type: raw
        default: ""
        description: TCP port; empty lets the module choose from tls.
