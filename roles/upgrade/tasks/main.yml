---
# tasks file for david_igou.routeros_configuration.upgrade
#
# Idempotent safe path: set the channel only when it differs, and check for
# updates (read-only). The install+reboot is gated behind routeros_upgrade_install
# and only fires when an update is actually available.

- name: Manage RouterOS package updates over the API
  delegate_to: localhost
  connection: local
  module_defaults:
    community.routeros.api:  # noqa: args[module]
      hostname: "{{ routeros_api_hostname }}"
      username: "{{ routeros_api_username }}"
      password: "{{ routeros_api_password }}"
      tls: "{{ routeros_api_tls | bool }}"
      validate_certs: "{{ routeros_api_validate_certs | bool }}"
      port: "{{ routeros_api_port | default(omit, true) }}"
  block:
    - name: Read current update settings
      community.routeros.api:  # noqa: args[module]
        path: system package update
      register: _upd
      changed_when: false

    - name: Set the update channel
      community.routeros.api:  # noqa: args[module]
        path: system package update
        cmd: "set channel={{ routeros_update_channel }}"
      changed_when: true
      when: ((_upd.msg | first).channel | default('')) != routeros_update_channel

    - name: Check for updates
      community.routeros.api:  # noqa: args[module]
        path: system package update
        cmd: check-for-updates
      changed_when: false
      # Checking needs outbound internet; a failed check should not break a play.
      # When install is requested but the check failed, the install gate below
      # simply will not fire.
      failed_when: false

    - name: Read update status after the check
      community.routeros.api:  # noqa: args[module]
        path: system package update
      register: _upd_status
      changed_when: false

    - name: Determine whether an installable update is available
      ansible.builtin.set_fact:
        _upd_install_pending: >-
          {{ routeros_upgrade_install | bool
             and ((_upd_status.msg | first).status | default('')) is search('New version') }}

    - name: Install the available update (REBOOTS the device)
      community.routeros.api:  # noqa: args[module]
        path: system package update
        cmd: install
      changed_when: true
      when: _upd_install_pending | bool

    - name: Wait for the API to come back after the install reboot
      ansible.builtin.include_role:
        name: david_igou.routeros_configuration._wait_api
      vars:
        _wait_api_timeout: "{{ routeros_upgrade_reboot_timeout }}"
        # Package installation runs during the reboot window.
        _wait_api_delay: 20
      when: _upd_install_pending | bool

    # RouterBOARD firmware. Gated and not exercised on a CHR (which has no
    # RouterBOARD). Only flashes + reboots when the installed firmware differs
    # from the firmware bundled with the running RouterOS — otherwise an enabled
    # flag would reboot the device on every run.
    - name: Read RouterBOARD firmware state
      community.routeros.api:  # noqa: args[module]
        path: system routerboard
      register: _rb
      changed_when: false
      when: routeros_routerboard_upgrade | bool

    - name: Determine whether the RouterBOARD firmware is out of date
      ansible.builtin.set_fact:
        _rb_needs_upgrade: >-
          {{ ((_rb.msg | first)['current-firmware'] | default(''))
             != ((_rb.msg | first)['upgrade-firmware'] | default('')) }}
      when: routeros_routerboard_upgrade | bool

    - name: Upgrade RouterBOARD firmware
      community.routeros.api:  # noqa: args[module]
        path: system routerboard
        cmd: upgrade
      changed_when: true
      when:
        - routeros_routerboard_upgrade | bool
        - _rb_needs_upgrade | default(false) | bool

    - name: Reboot to apply the RouterBOARD firmware and wait for the API
      community.routeros.api:  # noqa: args[module]
        path: system
        cmd: reboot
      changed_when: true
      when:
        - routeros_routerboard_upgrade | bool
        - _rb_needs_upgrade | default(false) | bool

    - name: Wait for the API to come back after the firmware reboot
      ansible.builtin.include_role:
        name: david_igou.routeros_configuration._wait_api
      vars:
        _wait_api_timeout: "{{ routeros_upgrade_reboot_timeout }}"
        # The firmware flash is applied during the reboot window.
        _wait_api_delay: 20
      when:
        - routeros_routerboard_upgrade | bool
        - _rb_needs_upgrade | default(false) | bool
