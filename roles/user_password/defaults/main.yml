---
# Shared connection to the RouterOS binary API. Override per host/group.
# In production prefer TLS (api-ssl, port 8729) with validate_certs: true.
# This comment block is duplicated in every API role's defaults — keep them
# byte-identical (canonical copy: roles/_reconcile/defaults/main.yml).
routeros_api_hostname: "{{ inventory_hostname }}"
routeros_api_username: admin
# Intentionally left undefined (no default): supply it via vault/group_vars.
# A missing password then fails loudly instead of silently attempting an
# empty-password login.
# routeros_api_password: "{{ vault_routeros_api_password }}"
routeros_api_tls: true
routeros_api_validate_certs: true
# Leave empty to let the module pick the port from `tls` (8728/8729).
routeros_api_port: ""

# Passwords to set. Each entry has name (required) and password (required).
# The user must already exist. Not idempotent — passwords are write-only.
routeros_user_passwords: []
