---
argument_specs:
  main:
    short_description: Set/rotate RouterOS /user passwords over the API.
    description:
      - Sets passwords for existing users. Not idempotent (passwords are write-only).
    examples: |
      # Passwords are secrets — always supply them via Ansible Vault.
      #
      # Rotate one user's password. Not idempotent (passwords are write-only):
      # the password is re-sent on every run, reported as ok — the API cmd
      # action cannot detect change.
      - hosts: routers
        gather_facts: false
        roles:
          - role: david_igou.routeros_configuration.user_password
            vars:
              routeros_user_passwords:
                - name: admin
                  password: "{{ vault_admin_password }}"

      # Rotate several users at once.
      - hosts: routers
        gather_facts: false
        roles:
          - role: david_igou.routeros_configuration.user_password
            vars:
              routeros_user_passwords:
                - name: admin
                  password: "{{ vault_admin_password }}"
                - name: monitoring
                  password: "{{ vault_monitoring_password }}"

      # Source the credentials from a vaulted group_vars file so no secret appears
      # in the playbook:
      #
      #   # group_vars/routers/vault.yml  (encrypt with ansible-vault)
      #   routeros_user_passwords:
      #     - name: admin
      #       password: S3cr3t-admin
      - hosts: routers
        gather_facts: false
        roles:
          - role: david_igou.routeros_configuration.user_password
    options:
      routeros_user_passwords:
        type: list
        elements: dict
        default: []
        # Secret — supply via Ansible Vault. Redaction is enforced at the task
        # level (no_log on the password-setting task), consistent with
        # routeros_api_password below; option-level no_log is omitted because the
        # role argument-spec schema (antsibull-docs) does not model it.
        description: Users and the passwords to set (secret — supply via Vault).
        options:
          name:
            type: str
            required: true
            description: Existing user name.
          password:
            type: str
            required: true
            description: New password.
      routeros_api_hostname:
        type: str
        default: "{{ inventory_hostname }}"
        description: API hostname/IP of the device.
      routeros_api_username:
        type: str
        default: admin
        description: API username.
      routeros_api_password:
        type: str
        description: API password. Secret — supply via vault.
      routeros_api_tls:
        type: bool
        default: true
        description: Use TLS (api-ssl).
      routeros_api_validate_certs:
        type: bool
        default: true
        description: Validate the device TLS certificate.
      routeros_api_port:
        type: raw
        default: ""
        description: TCP port; empty lets the module choose from tls.
