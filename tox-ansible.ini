# tox-ansible matrix control for the sanity + unit CI jobs (which run
# `tox --ansible --gh-matrix` via ansible/ansible-content-actions).
#
# skip = factors dropped from the generated (python x ansible-core) matrix.
#   py3.7 / py3.8 / 2.9-2.13 : unsupported, out of the collection's range.
#   py3.12-devel             : ansible-core devel (2.21+) requires Python
#                              >= 3.13, so the py3.12+devel combo cannot
#                              install and always fails. Drop just that combo
#                              (py3.12 stays tested on stable cores; devel
#                              stays tested on py3.13+). Revisit py3.12-milestone
#                              once milestone advances to a py3.13-only core.
[ansible]

skip =
    py3.7
    py3.8
    2.9
    2.10
    2.11
    2.12
    2.13
    py3.12-devel
